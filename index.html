<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리포트 대시보드</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <h1>📈 리포트 대시보드</h1>

    <input 
        type="text" 
        id="searchInput" 
        placeholder="검색어를 입력하세요"
        class="search-box"
    />

    <div class="container">

        <div class="left">
            <h2>리포트 목록</h2>
            <div id="reportList"></div>
        </div>

        <div class="right">
            <h2>요약</h2>
            <div id="summary" class="summary-box">
                리포트를 선택하세요.
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
