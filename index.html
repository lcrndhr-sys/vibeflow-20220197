<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리포트 대시보드</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>📈 리포트 대시보드 (RSS 기반 경제/시장 분석)</h1>

    <!-- 검색창 -->
    <input 
        type="text" 
        id="searchInput" 
        placeholder="검색어를 입력하세요 (제목, 출처, 본문)"
        class="search-box"
    />

    <div class="container">

        <!-- 왼쪽 리스트 -->
        <div class="left">
            <h2>리포트 목록</h2>
            <div id="reportList"></div>
        </div>

        <!-- 오른쪽 상세 요약 -->
        <div class="right">
            <h2>리포트 요약</h2>
            <div id="summary" class="summary-box">
                리포트를 선택하세요.
            </div>
        </div>

    </div>

    <!-- JS -->
    <script src="app.js"></script>
</body>
</html>
